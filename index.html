<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 커스텀 플래너</title>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Gowun Dodum', sans-serif;
        }
        body {
            background-color: #e6f0ed;
            background-image: radial-gradient(#b0c4bc 1.5px, transparent 1.5px);
            background-size: 20px 20px;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        /* 화면 비율에 맞고 모서리가 부드러운 직사각형 메인 컨테이너 */
        .main-container {
            width: 100%;
            max-width: 900px;
            background: #ffffff;
            border: 3px solid #333333;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }
        /* 상단 상태바 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .user-info {
            font-size: 14px;
            font-weight: bold;
        }
        /* 포우 아바타 실루엣 (이모지 없음, 항아리 형태) */
        .pou-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .pou-silhouette {
            width: 45px;
            height: 55px;
            border: 2px solid #333;
            border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%;
            transition: background 0.3s ease;
        }
        /* 5단계 색상 및 질감 클래스 */
        .pou-level-0 { background: #1a1a1a; } /* 검정 */
        .pou-level-1 { background: #888888; } /* 회색 */
        .pou-level-2 { background: #ffffff; } /* 흰색 */
        .pou-level-3 { background: linear-gradient(135deg, #ffffff 0%, #b0b0b0 50%, #6e6e6e 100%); } /* 은색 광택 */
        .pou-level-4 { background: linear-gradient(135deg, #fff8e1 0%, #ffd700 50%, #cca100 100%); } /* 샴페인 골드 광택 */

        /* 중앙 타이머 영역 */
        .timer-section {
            text-align: center;
            margin-bottom: 25px;
        }
        .timer-display {
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #333;
        }
        .timer-date {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
        .timer-btns {
            margin-top: 10px;
        }
        .btn {
            background: #fff;
            border: 2px solid #333;
            padding: 6px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            margin: 0 4px;
            transition: 0.2s;
        }
        .btn:hover {
            background: #333;
            color: #fff;
        }

        /* 탭 메뉴 */
        .tab-menu {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
        }
        .tab-btn {
            background: none;
            border: 2px solid #333;
            padding: 8px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        .tab-btn.active {
            background: #333;
            color: #fff;
        }

        /* 콘텐츠 패널 */
        .panel {
            display: none;
        }
        .panel.active {
            display: block;
        }

        /* 월간 달력 스타일 */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 20px;
            font-weight: bold;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }
        .calendar-day-name {
            text-align: center;
            font-weight: bold;
            padding: 5px;
        }
        .calendar-date-box {
            border: 2px solid #ddd;
            border-radius: 12px;
            min-height: 80px;
            padding: 8px;
            background: #fafafa;
            position: relative;
        }
        .calendar-date-box.today {
            border-color: #333;
            background: #fff;
        }
        .date-num {
            font-size: 14px;
            font-weight: bold;
        }

        /* 체크리스트 영역 */
        .todo-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .todo-input {
            flex: 1;
            padding: 8px 12px;
            border: 2px solid #333;
            border-radius: 10px;
        }
        .todo-list {
            list-style: none;
            padding: 0;
        }
        .todo-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f9f9f9;
            border: 2px solid #ddd;
            padding: 8px 12px;
            border-radius: 10px;
            margin-bottom: 8px;
        }
        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="main-container">
    <!-- 상단 상태바 -->
    <div class="status-bar">
        <div class="user-info">
            누적 시간: <span id="stat-hours">0시간</span> | 출석: <span id="stat-attendance">1일</span><br>
            칭호: <span id="stat-titles">없음</span> | 메달: <span id="stat-medal">IRON</span>
        </div>
        <div class="pou-container">
            <span id="pou-badge-name">[IRON] 아기 포우</span>
            <div id="pou-box" class="pou-silhouette pou-level-0"></div>
        </div>
    </div>

    <!-- 타이머 섹션 -->
    <div class="timer-section">
        <div class="timer-display" id="timer-display">00:00:00</div>
        <div class="timer-date" id="current-date-text">2026.07.23.(목)</div>
        <div class="timer-btns">
            <button class="btn" onclick="startTimer()">시작</button>
            <button class="btn" onclick="stopTimer()">일시정지</button>
            <button class="btn" onclick="addTestTime()">시간 임의추가(+1시간)</button>
        </div>
    </div>

    <!-- 탭 메뉴 -->
    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('todo')">일일 플래너</button>
        <button class="tab-btn" onclick="switchTab('calendar')">월간 달력</button>
    </div>

    <!-- 일일 플래너 패널 (체크리스트 + 삭제 기능) -->
    <div id="panel-todo" class="panel active">
        <h3>일일 체크리스트</h3>
        <div class="todo-container">
            <input type="text" id="todo-input" class="todo-input" placeholder="할 일을 입력하세요 (오타 시 삭제 가능)">
            <button class="btn" onclick="addTodo()">추가</button>
        </div>
        <ul id="todo-list" class="todo-list"></ul>
    </div>

    <!-- 월간 달력 패널 (이전/다음 달 이동 및 연월 갱신) -->
    <div id="panel-calendar" class="panel">
        <div class="calendar-header">
            <button class="btn" onclick="changeMonth(-1)">이전 달</button>
            <span id="calendar-title">2026년 7월</span>
            <button class="btn" onclick="changeMonth(1)">다음 달</button>
        </div>
        <div class="calendar-grid" id="calendar-grid">
            <!-- 요일 및 날짜 그리드가 자바스크립트로 동적 생성됨 -->
        </div>
    </div>
</div>

<script>
    // --- [데이터 상태 관리] ---
    let totalSeconds = 0;
    let attendanceDays = 1;
    let success100Days = 1; // 100% 달성 누적 일수
    let isRunning = false;
    let timerInterval = null;
    let lastTimestamp = Date.now();

    let todos = [];

    // 달력 관리용 날짜 객체
    let currentCalDate = new Date(2026, 6, 23); // 2026년 7월 기준

    // --- [백그라운드 타이머 로직 (Date.now 시간차 계산)] ---
    function startTimer() {
        if (isRunning) return;
        isRunning = true;
        lastTimestamp = Date.now();
        timerInterval = setInterval(() => {
            const now = Date.now();
            const diffSeconds = Math.floor((now - lastTimestamp) / 1000);
            if (diffSeconds > 0) {
                totalSeconds += diffSeconds;
                lastTimestamp = now;
                updateUI();
            }
        }, 1000);
    }

    function stopTimer() {
        isRunning = false;
        clearInterval(timerInterval);
    }

    function addTestTime() {
        totalSeconds += 3600; // 테스트용 1시간 추가
        updateUI();
    }

    function formatTime(totalSec) {
        const hrs = String(Math.floor(totalSec / 3600)).padStart(2, '0');
        const mins = String(Math.floor((totalSec % 3600) / 60)).padStart(2, '0');
        const secs = String(totalSec % 60).padStart(2, '0');
        return `${hrs}:${mins}:${secs}`;
    }

    // --- [칭호 및 메달 계산 로직] ---
    function updateAchievements() {
        const hours = totalSeconds / 3600;
        let titles = [];

        // 칭호 로직 (복수 획득 가능)
        if (hours >= 100 && attendanceDays >= 100) titles.push('#GOAT');
        else if (hours >= 100) titles.push('#참을성 갑');

        if (hours >= 500 && attendanceDays >= 365) titles.push('#CHALLENGER');
        else if (hours >= 500) titles.push('#시간도둑');

        if (attendanceDays >= 365) titles.push('#광인');
        else if (attendanceDays >= 100) titles.push('#출석의 달인');

        document.getElementById('stat-titles').innerText = titles.length > 0 ? titles.join(', ') : '없음';
        document.getElementById('stat-hours').innerText = `${Math.floor(hours)}시간`;
        document.getElementById('stat-attendance').innerText = `${attendanceDays}일`;

        // 포우 5단계 색상 진화 (시간 기준)
        const pouBox = document.getElementById('pou-box');
        pouBox.className = 'pou-silhouette';
        if (hours >= 500) pouBox.classList.add('pou-level-4'); // 금색
        else if (hours >= 100) pouBox.classList.add('pou-level-3'); // 은색
        else if (hours >= 50) pouBox.classList.add('pou-level-2'); // 흰색
        else if (hours >= 10) pouBox.classList.add('pou-level-1'); // 회색
        else pouBox.classList.add('pou-level-0'); // 검정

        // 메달 로직 (최고 단계 하나만 갱신)
        let medal = 'IRON';
        if (success100Days >= 150) medal = 'CHALLENGER';
        else if (success100Days >= 100) medal = 'GRANDMASTER';
        else if (success100Days >= 75) medal = 'MASTER';
        else if (success100Days >= 50) medal = 'DIAMOND';
        else if (success100Days >= 30) medal = 'EMERALD';
        else if (success100Days >= 15) medal = 'PLATINUM';
        else if (success100Days >= 7) medal = 'GOLD';
        else if (success100Days >= 5) medal = 'SILVER';
        else if (success100Days >= 3) medal = 'BRONZE';

        document.getElementById('stat-medal').innerText = medal;
        document.getElementById('pou-badge-name').innerText = `[${medal}] 아기 포우`;
    }

    function updateUI() {
        document.getElementById('timer-display').innerText = formatTime(totalSeconds);
        updateAchievements();
    }

    // --- [탭 전환 기능] ---
    function switchTab(tabName) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        if (tabName === 'todo') {
            document.getElementById('panel-todo').classList.add('active');
            event.target.classList.add('active');
        } else {
            document.getElementById('panel-calendar').classList.add('active');
            event.target.classList.add('active');
            renderCalendar();
        }
    }

    // --- [체크리스트 및 삭제 기능] ---
    function addTodo() {
        const input = document.getElementById('todo-input');
        const text = input.value.trim();
        if (!text) return;
        todos.push(text);
        input.value = '';
        renderTodos();
    }

    function deleteTodo(index) {
        todos.splice(index, 1);
        renderTodos();
    }

    function renderTodos() {
        const list = document.getElementById('todo-list');
        list.innerHTML = '';
        todos.forEach((item, index) => {
            const li = document.createElement('li');
            li.className = 'todo-item';
            li.innerHTML = `<span>${item}</span> <button class="delete-btn" onclick="deleteTodo(${index})">삭제</button>`;
            list.appendChild(li);
        });
    }

    // --- [월간 캘린더 (이전/다음 달 이동 및 연월 갱신)] ---
    fn_days = ['일', '월', '화', '수', '목', '금', '토'];

    function changeMonth(direction) {
        currentCalDate.setMonth(currentCalDate.getMonth() + direction);
        renderCalendar();
    }

    function renderCalendar() {
        const year = currentCalDate.getFullYear();
        const month = currentCalDate.getMonth();
        
        document.getElementById('calendar-title').innerText = `${year}년 ${month + 1}월`;

        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';

        // 요일 헤더 생성
        fn_days.forEach(day => {
            const div = document.createElement('div');
            div.className = 'calendar-day-name';
            div.innerText = day;
            grid.appendChild(div);
        });

        const firstDayIndex = new Date(year, month, 1).getDay();
        const totalDays = new Date(year, month + 1, 0).getDate();

        // 빈 칸 채우기 (월 시작 요일 맞춤)
        for (let i = 0; i < firstDayIndex; i++) {
            const emptyDiv = document.createElement('div');
            grid.appendChild(emptyDiv);
        }

        // 날짜 칸 채우기
        for (let d = 1; d <= totalDays; d++) {
            const dateBox = document.createElement('div');
            dateBox.className = 'calendar-date-box';
            dateBox.innerHTML = `<div class="date-num">${d}</div>`;
            grid.appendChild(dateBox);
        }
    }

    // 초기 실행
    updateUI();
    renderCalendar();
</script>

</body>
</html>
