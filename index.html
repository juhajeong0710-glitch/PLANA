<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLANA (플래나)</title>
    <!-- 웹 폰트 로드 -->
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Nanum+Gothic:wght@400;700&family=Press+Start+2P&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f9fa;
            --text-color: #000000;
            --border-color: #000000;
            --pattern-bg: none;
            --font-family: 'Nanum Gothic', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-family);
            color: var(--text-color);
        }

        body {
            background-color: #e5e5e5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 앱 전체 둥근 테두리 및 컨테이너 */
        #app {
            width: 100%;
            max-width: 430px;
            height: 90vh;
            max-height: 850px;
            background-color: var(--bg-color);
            background-image: var(--pattern-bg);
            border: 3px solid var(--border-color);
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        /* 상단 1/4 영역 */
        .header-section {
            height: 25%;
            border-bottom: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 12px 16px;
            position: relative;
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .user-info {
            font-size: 11px;
            line-height: 1.4;
        }

        .pou-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 둥근 삼각형 포우 아바타 */
        .pou-avatar {
            width: 45px;
            height: 40px;
            background-color: #8B5A2B; /* 기본 갈색 */
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
            border-radius: 12px 12px 20px 20px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 2px;
            transition: background-color 0.3s;
        }

        .pou-fire {
            position: absolute;
            top: -10px;
            font-size: 10px;
        }

        .total-time-box {
            text-align: center;
            margin-bottom: 5px;
        }

        .total-time {
            font-size: 26px;
            font-weight: bold;
        }

        .current-date {
            font-size: 11px;
            margin-top: 2px;
        }

        /* 하단 3/4 메인 콘텐츠 영역 */
        .main-content {
            height: 75%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 하단 네비게이션 탭 바 */
        .nav-bar {
            height: 55px;
            border-top: 2px solid var(--border-color);
            display: flex;
            background-color: inherit;
        }

        .nav-btn {
            flex: 1;
            background: none;
            border: none;
            border-right: 1px solid var(--border-color);
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }

        .nav-btn:last-child {
            border-right: none;
        }

        .nav-btn.active {
            background-color: rgba(0,0,0,0.08);
        }

        /* 공통 컴포넌트 스타일 */
        button, input, select {
            border: 2px solid var(--border-color);
            padding: 4px 8px;
            background: white;
            border-radius: 6px;
            font-size: 12px;
            outline: none;
        }

        button {
            cursor: pointer;
            font-weight: bold;
        }

        button:active {
            transform: scale(0.98);
        }

        /* 플래너 탭 스타일 */
        .planner-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--border-color);
        }

        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 6px;
            background: rgba(255,255,255,0.6);
        }

        .todo-item.completed span {
            text-decoration: line-through;
            color: #555;
        }

        /* 타이머 탭 스타일 */
        .timer-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 15px;
        }

        .timer-display {
            font-size: 42px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* 달력 탭 스타일 */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
            text-align: center;
        }

        .cal-cell {
            border: 1px solid var(--border-color);
            min-height: 55px;
            padding: 2px;
            font-size: 10px;
            background: rgba(255,255,255,0.4);
            text-align: left;
        }

        .cal-header {
            font-weight: bold;
            text-align: center;
            padding: 4px 0;
            border-bottom: 1px solid var(--border-color);
        }

        /* 통계 탭 스타일 */
        .stats-subtabs {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        .stat-card {
            border: 1px solid var(--border-color);
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.5);
        }

        /* 설정 탭 스타일 */
        .setting-group {
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 8px;
            background: rgba(255,255,255,0.5);
        }

        .setting-group h4 {
            margin-bottom: 8px;
            font-size: 13px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 3px;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        /* 칭호 보관함 모달 */
        #title-modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-box {
            width: 80%;
            background: white;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
        }
    </style>
</head>
<body>

<div id="app">
    <!-- 상단 1/4 영역 -->
    <div class="header-section">
        <div class="top-row">
            <div class="user-info" id="user-info-box">
                <div id="display-title">칭호 없음</div>
                <div>메달: <span id="display-medal">없음</span></div>
                <div>누적: <span id="display-accum-time">0시간</span></div>
                <div>출석: <span id="display-attend">0일</span></div>
                <button style="margin-top:4px; font-size:9px; padding:2px 4px;" onclick="openTitleModal()">칭호 보관함</button>
            </div>
            <div class="pou-container">
                <div class="pou-fire" id="pou-fire-display"></div>
                <div class="pou-avatar" id="pou-body"></div>
                <div style="font-size:10px; margin-top:2px; font-weight:bold;" id="pou-name-label">푸우</div>
            </div>
        </div>
        <div class="total-time-box">
            <div class="total-time" id="header-total-time">00:00:00</div>
            <div class="current-date" id="header-date">2026년 7월 23일</div>
        </div>
    </div>

    <!-- 하단 3/4 메인 콘텐츠 영역 -->
    <div class="main-content">
        <!-- 1. 플래너 탭 -->
        <div id="tab-planner" class="tab-content active">
            <div class="planner-header">
                <div>
                    <button onclick="changeDate(-1)">◀ 이전</button>
                    <span id="planner-date-title" style="font-weight:bold; margin:0 6px;">오늘</span>
                    <button onclick="changeDate(1)">다음 ▶</button>
                </div>
                <div>
                    <select id="subject-select" onchange="filterSubject()"></select>
                    <button onclick="openSubjectModal()" style="font-size:10px;">과목관리</button>
                </div>
            </div>
            <div style="display:flex; gap:5px; margin-bottom:8px;">
                <input type="text" id="todo-input" placeholder="할 일을 입력하세요..." style="flex:1;">
                <select id="todo-subject-select"></select>
                <button onclick=" addTodo()">추가</button>
            </div>
            <div id="todo-list-container" style="max-height: calc(100% - 75px); overflow-y:auto;"></div>
        </div>

        <!-- 2. 타이머 탭 -->
        <div id="tab-timer" class="tab-content">
            <div class="timer-screen">
                <div style="display:flex; gap:10px;">
                    <button id="mode-pomodoro" onclick="setTimerMode('pomodoro')">포모도로</button>
                    <button id="mode-free" onclick="setTimerMode('free')">자유 타이머</button>
                </div>
                <div class="timer-display" id="timer-clock">00:00:00</div>
                <div style="display:flex; gap:10px;">
                    <select id="timer-subject-select"></select>
                </div>
                <div style="display:flex; gap:10px;">
                    <button onclick="startTimer()" style="background:#b5e7a0; padding:8px 16px;">시작</button>
                    <button onclick="pauseTimer()" style="background:#ffb3ba; padding:8px 16px;">일시정지</button>
                    <button onclick="stopTimer()" style="background:#bae1ff; padding:8px 16px;">저장/종료</button>
                </div>
            </div>
        </div>

        <!-- 3. 월간 달력 탭 -->
        <div id="tab-calendar" class="tab-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <button onclick="changeMonth(-1)">◀</button>
                <span id="cal-month-title" style="font-weight:bold;">2026년 7월</span>
                <button onclick="changeMonth(1)">▶</button>
            </div>
            <div class="calendar-grid" id="calendar-grid-box"></div>
        </div>

        <!-- 4. 통계 탭 -->
        <div id="tab-stats" class="tab-content">
            <div class="stats-subtabs">
                <button onclick="switchStats('daily')" id="btn-stat-daily">Daily</button>
                <button onclick="switchStats('weekly')" id="btn-stat-weekly">Weekly</button>
                <button onclick="switchStats('monthly')" id="btn-stat-monthly">Monthly</button>
            </div>
            <div style="margin-bottom:8px; text-align:center;">
                <button onclick="changeStatDate(-1)">[이전]</button>
                <span id="stat-period-title" style="font-weight:bold; margin:0 8px;">오늘 통계</span>
                <button onclick="changeStatDate(1)">[다음]</button>
            </div>
            <div id="stats-body-container"></div>
        </div>

        <!-- 5. 설정 탭 -->
        <div id="tab-settings" class="tab-content">
            <div class="setting-group">
                <h4>테마 변경</h4>
                <div class="btn-grid">
                    <button onclick="setTheme(1)">1. 민트 점박이</button>
                    <button onclick="setTheme(2)">2. 연분홍 별</button>
                    <button onclick="setTheme(3)">3. 갈색 단색</button>
                    <button onclick="setTheme(4)">4. 갈색 초록점박이</button>
                </div>
            </div>
            <div class="setting-group">
                <h4>폰트 변경</h4>
                <div class="btn-grid">
                    <button onclick="setFont(1)">1. 고딕체</button>
                    <button onclick="setFont(2)">2. 픽셀체</button>
                    <button onclick="setFont(3)">3. 둥근체</button>
                    <button onclick="setFont(4)">4. 볼드체</button>
                </div>
            </div>
            <div class="setting-group">
                <h4>디데이 설정</h4>
                <input type="text" id="dday-name-input" placeholder="목표 이름" style="width:100%; margin-bottom:4px;">
                <input type="date" id="dday-date-input" style="width:100%; margin-bottom:4px;">
                <button onclick="saveDday()" style="width:100%;">디데이 저장</button>
                <div id="dday-display-box" style="margin-top:6px; font-weight:bold;"></div>
            </div>
        </div>
    </div>

    <!-- 하단 네비게이션 탭 바 -->
    <div class="nav-bar">
        <button class="nav-btn active" onclick="switchTab('planner', this)"><span>📋</span>플래너</button>
        <button class="nav-btn" onclick="switchTab('timer', this)"><span>⏱️</span>타이머</button>
        <button class="nav-btn" onclick="switchTab('calendar', this)"><span>📅</span>월간달력</button>
        <button class="nav-btn" onclick="switchTab('stats', this)"><span>📊</span>통계</button>
        <button class="nav-btn" onclick="switchTab('settings', this)"><span>⚙️</span>설정</button>
    </div>

    <!-- 칭호 보관함 모달 -->
    <div id="title-modal">
        <div class="modal-box">
            <h4>칭호 보관함</h4>
            <div id="unlocked-titles-list" style="margin:10px 0; max-height:150px; overflow-y:auto;"></div>
            <button onclick="closeTitleModal()" style="width:100%;">닫기</button>
        </div>
    </div>
</div>

<script>
    // 상태 관리 데이터
    let state = {
        currentDate: new Date().toISOString().split('T')[0],
        subjects: ['국어', '수학', '영어', '탐구', '기타'],
        todos: {}, // { 'YYYY-MM-DD': [ {text, subject, completed} ] }
        studyTimes: {}, // { 'YYYY-MM-DD': { '과목명': 초단위시간 } }
        accumulatedSeconds: 0,
        accumulatedDays: 1,
        completed100DaysCount: 0,
        unlockedTitles: [],
        selectedTitle: '',
        currentMedal: '',
        ddayName: '',
        ddayDate: '',
        theme: 1,
        font: 1,
        statMode: 'daily',
        statOffsetDate: new Date().toISOString().split('T')[0],
        calYear: new Date().getFullYear(),
        calMonth: new Date().getMonth(),
        plannerOffsetDate: new Date().toISOString().split('T')[0]
    };

    // 타이머 변수
    let timerInterval = null;
    let timerSeconds = 0;
    let timerRunning = false;
    let selectedTimerSubject = '국어';
    let timerMode = 'free';

    // 로컬 스토리지 로드
    function loadData() {
        const saved = localStorage.getItem('plana_data_v1');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                state = { ...state, ...parsed };
            } catch(e) {}
        }
    }

    function saveData() {
        localStorage.setItem('plana_data_v1', JSON.stringify(state));
    }

    // 초기화 실행
    window.onload = function() {
        loadData();
        renderSubjects();
        updateHeaderInfo();
        renderPlanner();
        renderCalendar();
        renderStats();
        setTheme(state.theme);
        setFont(state.font);
        
        // 백그라운드 시간 측정 보정 로직 (Date.now 기반)
        setInterval(() => {
            if (timerRunning) {
                timerSeconds++;
                updateTimerDisplay();
            }
        }, 1000);
    };

    // 탭 전환
    function switchTab(tabName, btnEl) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-' + tabName).classList.add('active');
        if(btnEl) btnEl.classList.add('active');
    }

    // 헤더 및 포우 정보 갱신
    function updateHeaderInfo() {
        const todayStr = new Date().toISOString().split('T')[0];
        let todaySecs = 0;
        if(state.studyTimes[todayStr]) {
            todaySecs = Object.values(state.studyTimes[todayStr]).reduce((a,b)=>a+b, 0);
        }

        // 총 시간 표시
        const hrs = Math.floor(todaySecs / 3600);
        const mins = Math.floor((todaySecs % 3600) / 60);
        const secs = todaySecs % 60;
        document.getElementById('header-total-time').innerText = 
            String(hrs).padStart(2,'0') + ':' + String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');

        // 날짜 표시
        const now = new Date();
        document.getElementById('header-date').innerText = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일`;

        // 포우 색상 및 불꽃 진화 (1시간 단위 5단계 + 6시간 이후 불꽃)
        const pouBody = document.getElementById('pou-body');
        const pouFire = document.getElementById('pou-fire-display');
        let colorHex = '#8B5A2B';
        if (hrs === 1) colorHex = '#a06531';
        else if (hrs === 2) colorHex = '#b87333';
        else if (hrs === 3) colorHex = '#d4af37';
        else if (hrs === 4) colorHex = '#e6c65c';
        else if (hrs >= 5) colorHex = '#ffd700'; // 성인 금색 포우
        pouBody.style.backgroundColor = colorHex;

        if (hrs >= 6) {
            let fireCount = hrs - 5;
            pouFire.innerText = '🔥'.repeat(fireCount);
        } else {
            pouFire.innerText = '';
        }

        // 칭호 및 메달 이름 결합 표시
        let pouName = "푸우";
        // 조기 타이머 / 10시간 이상 칭호 판정 (간이)
        if(hrs >= 10) pouName = "불타는 푸우";
        
        let titleDisp = state.selectedTitle ? state.selectedTitle : "칭호 없음";
        let medalDisp = state.currentMedal ? `[${state.currentMedal}]` : "";

        document.getElementById('display-title').innerText = titleDisp;
        document.getElementById('display-medal').innerText = state.currentMedal || "없음";
        document.getElementById('display-accum-time').innerText = Math.floor(todaySecs/3600) + "시간";
        document.getElementById('display-attend').innerText = state.accumulatedDays + "일";
        document.getElementById('pou-name-label').innerText = `${medalDisp} ${pouName}`;

        // 업적 체크 (누적 시간 및 출석)
        checkAchievements(todaySecs);
    }

    // 업적 시스템 판정
    function checkAchievements(totalSecs) {
        let totalHoursAll = Math.floor(totalSecs / 3600); // 간이 누적
        let days = state.accumulatedDays;

        let newTitles = [...state.unlockedTitles];
        if (totalHoursAll >= 100 && !newTitles.includes("#참을성 갑🪽")) newTitles.push("#참을성 갑🪽");
        if (totalHoursAll >= 500 && !newTitles.includes("#시간도둑🥷🏿")) newTitles.push("#시간도둑🥷🏿");
        if (days >= 100 && !newTitles.includes("#출석의 달인🫰🏻")) newTitles.push("#출석의 달인🫰🏻");
        if (days >= 365 && !newTitles.includes("#광인☠️")) newTitles.push("#광인☠️");
        if (totalHoursAll >= 100 && days >= 100 && !newTitles.includes("#GOAT🐐")) newTitles.push("#GOAT🐐");
        if (totalHoursAll >= 500 && days >= 365 && !newTitles.includes("#CHALLENGER☠️")) newTitles.push("#CHALLENGER☠️");

        state.unlockedTitles = newTitles;

        // 메달 승급 판정 (대체형)
        let cDays = state.completed100DaysCount;
        if (cDays >= 150) state.currentMedal = "CHALLENGER⚜️";
        else if (cDays >= 100) state.currentMedal = "GRANDMASTER🐦‍🔥";
        else if (cDays >= 75) state.currentMedal = "MASTER👿";
        else if (cDays >= 50) state.currentMedal = "DIAMOND💎";
        else if (cDays >= 30) state.currentMedal = "EMERALD❇️";
        else if (cDays >= 15) state.currentMedal = "PLATINUM 🧊";
        else if (cDays >= 7) state.currentMedal = "GOLD👑";
        else if (cDays >= 5) state.currentMedal = "SILVER⚔️";
        else if (cDays >= 3) state.currentMedal = "BRONZE🤎";
        else if (cDays >= 1) state.currentMedal = "IRON🔨";

        saveData();
    }

    // 칭호 보관함 모달
    function openTitleModal() {
        const listEl = document.getElementById('unlocked-titles-list');
        listEl.innerHTML = '';
        if(state.unlockedTitles.length === 0) {
            listEl.innerHTML = '<div>획득한 칭호가 없습니다.</div>';
        } else {
            state.unlockedTitles.forEach(t => {
                listEl.innerHTML += `<div style="margin-bottom:6px;"><button onclick="selectTitle('${t}')">${t}</button></div>`;
            });
        }
        document.getElementById('title-modal').style.display = 'flex';
    }
    function closeTitleModal() {
        document.getElementById('title-modal').style.display = 'none';
    }
    function selectTitle(t) {
        state.selectedTitle = t;
        saveData();
        updateHeaderInfo();
        closeTitleModal();
    }

    // 과목 및 셀렉트 렌더링
    function renderSubjects() {
        const sSelects = [
            document.getElementById('subject-select'),
            document.getElementById('todo-subject-select'),
            document.getElementById('timer-subject-select')
        ];
        sSelects.forEach(el => {
            if(!el) return;
            const currentVal = el.value;
            el.innerHTML = '<option value="">전체과목</option>';
            state.subjects.forEach(sub => {
                el.innerHTML += `<option value="${sub}">${sub}</option>`;
            });
            el.value = currentVal;
        });
    }

    function openSubjectModal() {
        let newSub = prompt("추가할 과목명을 입력하세요:");
        if(newSub && !state.subjects.includes(newSub)) {
            state.subjects.push(newSub);
            saveData();
            renderSubjects();
        }
    }

    // 플래너 기능
    function renderPlanner() {
        const container = document.getElementById('todo-list-container');
        container.innerHTML = '';
        const targetDate = state.plannerOffsetDate;
        document.getElementById('planner-date-title').innerText = targetDate;

        if(!state.todos[targetDate]) state.todos[targetDate] = [];
        
        state.todos[targetDate].forEach((item, idx) => {
            container.innerHTML += `
                <div class="todo-item ${item.completed ? 'completed' : ''}">
                    <label style="display:flex; align-items:center; gap:8px; flex:1;">
                        <input type="checkbox" ${item.completed ? 'checked' : ''} onclick="toggleTodo('${targetDate}', ${idx})">
                        <span>[${item.subject}] ${item.text}</span>
                    </label>
                    <button onclick="deleteTodo('${targetDate}', ${idx})" style="font-size:10px;">삭제</button>
                </div>
            `;
        });
    }

    function addTodo() {
        const text = document.getElementById('todo-input').value;
        const sub = document.getElementById('todo-subject-select').value || state.subjects[0];
        if(!text) return;
        const targetDate = state.plannerOffsetDate;
        if(!state.todos[targetDate]) state.todos[targetDate] = [];
        state.todos[targetDate].push({ text, subject: sub, completed: false });
        document.getElementById('todo-input').value = '';
        saveData();
        renderPlanner();
    }

    function toggleTodo(date, idx) {
        let item = state.todos[date][idx];
        item.completed = !item.completed;
        // 완료시 아래로 정렬
        if(item.completed) {
            state.todos[date].splice(idx, 1);
            state.todos[date].push(item);
            // 100% 달성 판정 (오늘 기준 모든 할일 완료시)
            state.completed100DaysCount++;
        } else {
            state.completed100DaysCount = Math.max(0, state.completed100DaysCount - 1);
        }
        saveData();
        renderPlanner();
        updateHeaderInfo();
    }

    function deleteTodo(date, idx) {
        state.todos[date].splice(idx, 1);
        saveData();
        renderPlanner();
    }

    function changeDate(val) {
        let d = new Date(state.plannerOffsetDate);
        d.setDate(d.getDate() + val);
        state.plannerOffsetDate = d.toISOString().split('T')[0];
        renderPlanner();
    }

    function filterSubject() { renderPlanner(); }

    // 타이머 기능
    function setTimerMode(mode) {
        timerMode = mode;
        document.getElementById('mode-pomodoro').style.background = mode === 'pomodoro' ? '#ddd' : '#fff';
        document.getElementById('mode-free').style.background = mode === 'free' ? '#ddd' : '#fff';
    }

    function startTimer() {
        if(timerRunning) return;
        timerRunning = true;
    }

    function pauseTimer() {
        timerRunning = false;
    }

    function stopTimer() {
        if(timerSeconds <= 0) return;
        timerRunning = false;
        const sub = document.getElementById('timer-subject-select').value || '기타';
        const todayStr = new Date().toISOString().split('T')[0];
        if(!state.studyTimes[todayStr]) state.studyTimes[todayStr] = {};
        if(!state.studyTimes[todayStr][sub]) state.studyTimes[todayStr][sub] = 0;
        state.studyTimes[todayStr][sub] += timerSeconds;

        timerSeconds = 0;
        updateTimerDisplay();
        saveData();
        updateHeaderInfo();
        alert("공부 시간이 저장되었습니다!");
    }

    function updateTimerDisplay() {
        let hrs = Math.floor(timerSeconds / 3600);
        let mins = Math.floor((timerSeconds % 3600) / 60);
        let secs = timerSeconds % 60;
        document.getElementById('timer-clock').innerText = 
            String(hrs).padStart(2,'0') + ':' + String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
    }

    // 월간 달력 기능
    function renderCalendar() {
        const grid = document.getElementById('calendar-grid-box');
        grid.innerHTML = '';
        const y = state.calYear;
        const m = state.calMonth;
        document.getElementById('cal-month-title').innerText = `${y}년 ${m+1}월`;

        const daysOfWeek = ['일','월','화','수','목','금','토'];
        daysOfWeek.forEach(d => {
            grid.innerHTML += `<div class="cal-header">${d}</div>`;
        });

        const firstDay = new Date(y, m, 1).getDay();
        const lastDate = new Date(y, m+1, 0).getDate();

        for(let i=0; i<firstDay; i++) {
            grid.innerHTML += `<div></div>`;
        }

        for(let d=1; d<=lastDate; d++) {
            let dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            grid.innerHTML += `
                <div class="cal-cell">
                    <div style="font-weight:bold;">${d}</div>
                </div>
            `;
        }
    }

    function changeMonth(val) {
        state.calMonth += val;
        if(state.calMonth > 11) { state.calMonth = 0; state.calYear++; }
        if(state.calMonth < 0) { state.calMonth = 11; state.calYear--; }
        renderCalendar();
    }

    // 통계 기능
    function switchStats(mode) {
        state.statMode = mode;
        renderStats();
    }

    function renderStats() {
        const body = document.getElementById('stats-body-container');
        body.innerHTML = '';
        document.getElementById('stat-period-title').innerText = state.statOffsetDate;

        let targetData = state.studyTimes[state.statOffsetDate] || {};
        let totalSec = Object.values(targetData).reduce((a,b)=>a+b, 0);

        body.innerHTML += `<div class="stat-card">총 공부 시간: ${Math.floor(totalSec/3600)}시간 ${Math.floor((totalSec%3600)/60)}분</div>`;
        
        state.subjects.forEach(sub => {
            let sSec = targetData[sub] || 0;
            let ratio = totalSec > 0 ? Math.round((sSec / totalSec) * 100) : 0;
            body.innerHTML += `<div class="stat-card">${sub}: ${Math.floor(sSec/3600)}시간 (${ratio}%)</div>`;
        });
    }

    function changeStatDate(val) {
        let d = new Date(state.statOffsetDate);
        d.setDate(d.getDate() + val);
        state.statOffsetDate = d.toISOString().split('T')[0];
        renderStats();
    }

    // 설정 탭 (테마 및 폰트 변경 전용)
    function setTheme(num) {
        state.theme = num;
        saveData();
        const app = document.getElementById('app');
        if(num === 1) {
            app.style.backgroundColor = '#e8f5e9';
            app.style.backgroundImage = 'radial-gradient(#8B5A2B 15%, transparent 16%)';
            app.style.backgroundSize = '20px 20px';
        } else if(num === 2) {
            app.style.backgroundColor = '#ffe4e1';
            app.style.backgroundImage = 'radial-gradient(#ff69b4 15%, transparent 16%)';
            app.style.backgroundSize = '25px 25px';
        } else if(num === 3) {
            app.style.backgroundColor = '#d2b48c';
            app.style.backgroundImage = 'none';
        } else if(num === 4) {
            app.style.backgroundColor = '#8B5A2B';
            app.style.backgroundImage = 'radial-gradient(#556b2f 15%, transparent 16%)';
            app.style.backgroundSize = '20px 20px';
        }
    }

    function setFont(num) {
        state.font = num;
        saveData();
        if(num === 1) document.documentElement.style.setProperty('--font-family', "'Nanum Gothic', sans-serif");
        else if(num === 2) document.documentElement.style.setProperty('--font-family', "'Press Start 2P', monospace");
        else if(num === 3) document.documentElement.style.setProperty('--font-family', "'Gowun Dodum', sans-serif");
        else if(num === 4) document.documentElement.style.setProperty('--font-family', "'Noto Sans KR', sans-serif");
    }

    function saveDday() {
        state.ddayName = document.getElementById('dday-name-input').value;
        state.ddayDate = document.getElementById('dday-date-input').value;
        saveData();
        renderDday();
    }

    function renderDday() {
        if(!state.ddayDate) return;
        const diff = Math.ceil((new Date(state.ddayDate) - new Date()) / (1000 * 60 * 60 * 24));
        document.getElementById('dday-display-box').innerText = `${state.ddayName} D-${diff}`;
    }
</script>

</body>
</html>
