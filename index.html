<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLANA (플래나)</title>
    <style>
        /* 테마 정의 */
        :root {
            --bg-color: #eaf3f0;
            --dot-color: rgba(143, 163, 153, 0.3);
            --main-border: #4a5851;
            --card-bg: #ffffff;
            --text-color: #333333;
            --font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
        }

        body.theme-mint {
            --bg-color: #eaf3f0;
            --dot-color: rgba(143, 163, 153, 0.3);
            --main-border: #4a5851;
            --card-bg: #ffffff;
        }
        body.theme-pink {
            --bg-color: #fae1e8;
            --dot-color: rgba(219, 154, 175, 0.3);
            --main-border: #8c5365;
            --card-bg: #ffffff;
        }
        body.theme-brown {
            --bg-color: #d7ccc8;
            --dot-color: rgba(141, 110, 99, 0.3);
            --main-border: #4e342e;
            --card-bg: #efebe9;
        }
        body.theme-mute {
            --bg-color: #4e433d;
            --dot-color: rgba(110, 133, 115, 0.4);
            --main-border: #a3b8a8;
            --card-bg: #3e332e;
            --text-color: #f5f5f5;
        }

        /* 폰트 정의 */
        body.font-gothic { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
        body.font-pixel { font-family: 'Courier New', Courier, monospace; }
        body.font-round { font-family: 'Jua', 'Comic Sans MS', sans-serif; }
        body.font-bold { font-family: 'Arial Black', Gadget, sans-serif; font-weight: bold; }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--dot-color) 4px, transparent 4px);
            background-size: 40px 40px;
            color: var(--text-color);
            box-sizing: border-box;
            font-family: var(--font-family);
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            background: var(--card-bg);
            border: 2px solid var(--main-border);
            box-shadow: 4px 4px 0px var(--main-border);
        }

        /* 상단 1/4 구역 디자인 */
        .top-quarter {
            border-bottom: 2px solid var(--main-border);
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .left-info {
            font-size: 13px;
            line-height: 1.6;
        }

        .center-time-box {
            text-align: center;
        }

        .center-time-box h1 {
            font-size: 44px;
            margin: 0;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .center-time-box .date-str {
            font-size: 13px;
            opacity: 0.8;
            margin-top: 4px;
        }

        /* 푸우 캐릭터 디자인 (원형이 아닌 전용 형태) */
        .pou-container {
            text-align: center;
        }

        .pou-meta-info {
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .pou-avatar-wrap {
            width: 65px;
            height: 60px;
            margin: 0 auto;
            position: relative;
        }

        .pou-body {
            width: 55px;
            height: 48px;
            background: #ab8d62;
            border-radius: 50% 50% 45% 45%;
            position: absolute;
            bottom: 0;
            left: 5px;
            border: 2px solid var(--main-border);
        }

        .pou-eye {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 14px;
            border: 1px solid #333;
        }
        .pou-eye.left { left: 12px; }
        .pou-eye.right { right: 12px; }

        .pou-pupil {
            width: 3px;
            height: 3px;
            background: #333;
            border-radius: 50%;
            position: absolute;
            top: 3px;
            left: 3px;
        }

        .pou-expression {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
        }

        /* 탭 메뉴 */
        .nav-tabs {
            display: flex;
            border: 2px solid var(--main-border);
            background: rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            background: none;
            border: none;
            border-right: 2px solid var(--main-border);
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            color: var(--text-color);
        }
        .tab-btn:last-child { border-right: none; }
        .tab-btn.active { background: var(--main-border); color: #fff; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 컴포넌트 박스 스타일 */
        .content-box {
            border: 2px solid var(--main-border);
            background: var(--card-bg);
            padding: 20px;
            margin-bottom: 15px;
        }

        .input-row {
            display: flex;
            border: 2px solid var(--main-border);
            background: var(--card-bg);
            margin-bottom: 15px;
        }
        .input-row select, .input-row input {
            border: none;
            padding: 10px;
            outline: none;
            background: transparent;
            font-size: 14px;
            color: var(--text-color);
        }
        .input-row input { flex: 1; }
        .add-btn {
            border-left: 2px solid var(--main-border);
            background: #eee;
            padding: 0 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .todo-item {
            display: flex;
            align-items: center;
            border-bottom: 1px dashed var(--main-border);
            padding: 10px 5px;
            font-size: 14px;
            gap: 12px;
        }
        .todo-item.done span {
            text-decoration: line-through;
            opacity: 0.6;
        }
        .todo-item span { flex: 1; }

        .sub-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 14px;
            font-weight: bold;
        }
        .ctrl-btn {
            border: 2px solid var(--main-border);
            background: var(--card-bg);
            padding: 5px 12px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            color: var(--text-color);
        }

        /* 통계 및 칭호 모달 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-body {
            background: #fff;
            padding: 25px;
            border: 3px solid #4a5851;
            width: 350px;
            color: #333;
            text-align: center;
        }
    </style>
</head>
<body class="theme-mint font-gothic">

<div class="container">
    <!-- 상단 1/4 구역 -->
    <div class="top-quarter">
        <div class="left-info">
            <div>⏱️ 누적: <b id="total-time">0시간</b> | 📅 출석: <b id="total-days">1일</b></div>
            <div>🎯 D-Day: <b id="d-day-view">미설정</b></div>
            <button class="ctrl-btn" style="margin-top:6px;" onclick="openModal('badge-modal')">🏆 칭호/메달함</button>
        </div>

        <div class="center-time-box">
            <h1 id="timer-screen">00:00:00</h1>
            <div class="date-str" id="today-date-str">2026.07.23.(목)</div>
        </div>

        <div class="pou-container">
            <div class="pou-meta-info" id="pou-full-title">[IRON🔨] 아기 포우</div>
            <div class="pou-avatar-wrap">
                <div class="pou-body">
                    <div class="pou-eye left"><div class="pou-pupil"></div></div>
                    <div class="pou-eye right"><div class="pou-pupil"></div></div>
                    <div class="pou-expression" id="pou-face-expression">😠</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 탭 메뉴 -->
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('daily')">일일 플래너</button>
        <button class="tab-btn" onclick="switchTab('timer')">타이머</button>
        <button class="tab-btn" onclick="switchTab('calendar')">월간 달력</button>
        <button class="tab-btn" onclick="switchTab('stats')">통계</button>
        <button class="tab-btn" onclick="switchTab('settings')">설정</button>
    </div>

    <!-- 일일 플래너 탭 -->
    <div id="tab-daily" class="tab-content active">
        <div class="sub-bar">
            <div>
                <button class="ctrl-btn" onclick="changeDate(-1)">&lt; 이전</button>
                <span id="current-planner-date" style="margin: 0 10px;">2026.07.23</span>
                <button class="ctrl-btn" onclick="changeDate(1)">다음 &gt;</button>
            </div>
            <div>목표 달성률: <span id="achievement-rate">0%</span></div>
        </div>

        <div class="input-row">
            <select id="subject-select">
                <option value="국어">국어</option>
                <option value="수학">수학</option>
                <option value="영어">영어</option>
                <option value="탐구">탐구</option>
            </select>
            <input type="text" id="todo-input-text" placeholder="오늘 할 일을 입력하세요..." onkeypress="if(event.key==='Enter') addTodo()">
            <button class="add-btn" onclick="addTodo()">추가</button>
        </div>

        <div class="content-box" id="todo-list-container" style="min-height: 250px;">
            <!-- 리스트 항목 -->
        </div>
    </div>

    <!-- 타이머 탭 -->
    <div id="tab-timer" class="tab-content">
        <div class="content-box" style="text-align: center; padding: 40px;">
            <h3>스터디 타이머</h3>
            <div style="margin: 15px 0;">
                방식: 
                <select id="timer-mode" style="padding: 5px;">
                    <option value="free">자유 타이머</option>
                    <option value="pomodoro">포모도로 (25분/5분)</option>
                </select>
            </div>
            <button class="ctrl-btn" style="padding: 12px 30px; font-size:16px;" onclick="toggleTimer()" id="timer-btn">시작</button>
            <button class="ctrl-btn" style="padding: 12px 20px; font-size:16px;" onclick="resetTimer()">리셋</button>
        </div>
    </div>

    <!-- 월간 달력 탭 -->
    <div id="tab-calendar" class="tab-content">
        <div class="content-box">
            <h3>월간 플래너 (미래/과거 미리 작성)</h3>
            <div style="padding: 40px; text-align: center; opacity: 0.7;">직사각형 달력 그리드 영역</div>
        </div>
    </div>

    <!-- 통계 탭 -->
    <div id="tab-stats" class="tab-content">
        <div class="content-box">
            <h3>학습 통계</h3>
            <div style="display: flex; gap: 20px; align-items: center; margin-top: 15px;">
                <div style="width: 100px; height: 100px; border-radius: 50%; background: conic-gradient(#4a5851 0deg 220deg, #8fa399 220deg 360deg); border: 2px solid var(--main-border);"></div>
                <div>
                    <p><b>과목별 분포 비율</b></p>
                    <p style="font-size: 13px;">국어 60% / 수학 40%</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 설정 탭 -->
    <div id="tab-settings" class="tab-content">
        <div class="content-box">
            <h3>앱 환경 설정</h3>
            <div style="margin-bottom: 15px;">
                <label><b>테마 선택:</b></label><br>
                <button class="ctrl-btn" onclick="setTheme('mint')">연한민트</button>
                <button class="ctrl-btn" onclick="setTheme('pink')">연분홍</button>
                <button class="ctrl-btn" onclick="setTheme('brown')">갈색</button>
                <button class="ctrl-btn" onclick="setTheme('mute')">뮤트초록</button>
            </div>
            <div style="margin-bottom: 15px;">
                <label><b>폰트 선택:</b></label><br>
                <button class="ctrl-btn" onclick="setFont('gothic')">기본고딕</button>
                <button class="ctrl-btn" onclick="setFont('pixel')">픽셀</button>
                <button class="ctrl-btn" onclick="setFont('round')">둥근느낌</button>
                <button class="ctrl-btn" onclick="setFont('bold')">볼드체</button>
            </div>
            <div>
                <label><b>디데이 설정:</b> <input type="date" id="dday-input" onchange="updateDDay()"></label>
            </div>
        </div>
    </div>
</div>

<!-- 칭호/메달 모달 -->
<div class="modal" id="badge-modal">
    <div class="modal-body">
        <h3>🏆 칭호 및 메달 보관함</h3>
        <p style="text-align: left; font-size: 13px; line-height: 1.6;">
            <b>보유 칭호:</b> #참을성 갑🪽, #출석의 달인🫰🏻<br>
            <b>보유 메달:</b> [IRON🔨], [BRONZE🤎]
        </p>
        <button class="ctrl-btn" onclick="closeModal('badge-modal')">닫기</button>
    </div>
</div>

<script>
    let studySeconds = 0;
    let timerRunning = false;
    let timerObj = null;
    let todos = [];
    let currentDate = new Date(2026, 6, 23);

    function switchTab(name) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('tab-' + name).classList.add('active');
    }

    function setTheme(theme) {
        document.body.className = document.body.className.replace(/theme-\w+/, 'theme-' + theme);
    }

    function setFont(font) {
        document.body.className = document.body.className.replace(/font-\w+/, 'font-' + font);
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function changeDate(days) {
        currentDate.setDate(currentDate.getDate() + days);
        let y = currentDate.getFullYear();
        let m = String(currentDate.getMonth() + 1).padStart(2, '0');
        let d = String(currentDate.getDate()).padStart(2, '0');
        document.getElementById('current-planner-date').innerText = `${y}.${m}.${d}`;
    }

    function toggleTimer() {
        if(!timerRunning) {
            timerObj = setInterval(() => {
                studySeconds++;
                updateTimerUI();
            }, 1000);
            document.getElementById('timer-btn').innerText = '일시정지';
        } else {
            clearInterval(timerObj);
            document.getElementById('timer-btn').innerText = '시작';
        }
        timerRunning = !timerRunning;
    }

    function resetTimer() {
        clearInterval(timerObj);
        studySeconds = 0;
        timerRunning = false;
        document.getElementById('timer-btn').innerText = '시작';
        updateTimerUI();
    }

    function updateTimerUI() {
        let h = Math.floor(studySeconds / 3600);
        let m = Math.floor((studySeconds % 3600) / 60);
        let s = studySeconds % 60;
        document.getElementById('timer-screen').innerText = 
            `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        document.getElementById('total-time').innerText = h + '시간';

        let exprs = ['😠', '😅', '😉', '☺️', '😚', '🥰', '🥹', '🫪'];
        let idx = h > 7 ? 7 : h;
        document.getElementById('pou-face-expression').innerText = exprs[idx];
    }

    function addTodo() {
        let subject = document.getElementById('subject-select').value;
        let text = document.getElementById('todo-input-text').value;
        if(!text) return;
        todos.push({subject, text, done: false});
        document.getElementById('todo-input-text').value = '';
        renderTodos();
    }

    function toggleTodo(i) {
        todos[i].done = !todos[i].done;
        todos.sort((a, b) => a.done - b.done);
        renderTodos();
    }

    function renderTodos() {
        let container = document.getElementById('todo-list-container');
        container.innerHTML = '';
        let doneCnt = 0;
        todos.forEach((t, i) => {
            if(t.done) doneCnt++;
            container.innerHTML += `
                <div class="todo-item ${t.done ? 'done' : ''}">
                    <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${i})">
                    <b>[${t.subject}]</b>
                    <span>${t.text}</span>
                </div>
            `;
        });
        let rate = todos.length === 0 ? 0 : Math.round((doneCnt / todos.length) * 100);
        document.getElementById('achievement-rate').innerText = rate + '%';
    }

    function updateDDay() {
        let val = document.getElementById('dday-input').value;
        if(!val) return;
        let diff = Math.ceil((new Date(val) - new Date()) / (1000*60*60*24));
        document.getElementById('d-day-view').innerText = diff >= 0 ? `D-${diff}` : `D+${Math.abs(diff)}`;
    }
</script>
</body>
</html>
