<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PLANA : Pou Edition</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-main: #f0f4f8; --card-bg: #ffffff; --primary: #7c9473;
            --primary-light: #e8fee4; --text-dark: #2d3748; --text-gray: #a0aec0;
            --border-color: #edf2f7; --accent: #f6ad55; --pou-body: #cfb997;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; user-select: none; }
        body { background-color: var(--bg-main); color: var(--text-dark); display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .app-container { width: 100%; max-width: 480px; background: var(--card-bg); height: 100%; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .header { padding: 20px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 24px; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
        .tab-content { flex: 1; overflow-y: auto; padding: 10px 20px 80px; display: none; }
        .tab-content.active { display: block; }
        .pou-card { background: linear-gradient(135deg, #eef2f5 0%, #e6ebd9 100%); border-radius: 24px; padding: 20px; display: flex; flex-direction: column; align-items: center; position: relative; margin-bottom: 20px; box-shadow: inset 0 2px 4px rgba(255,255,255,0.8); }
        .pou-status { width: 100%; display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; font-weight: bold; color: #5a6b52; }
        .pou-stage { background: rgba(255,255,255,0.6); padding: 4px 12px; border-radius: 12px; }
        .pou-container { width: 140px; height: 120px; position: relative; display: flex; justify-content: center; align-items: flex-end; margin: 15px 0; }
        .pou { width: 120px; height: 100px; background-color: var(--pou-body); border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%; position: relative; transition: all 0.3s ease; box-shadow: inset -8px -8px 0 rgba(0,0,0,0.1), 0 8px 15px rgba(0,0,0,0.08); cursor: pointer; }
        .pou:active { transform: scale(0.95); }
        .pou-eye { width: 18px; height: 24px; background: white; border-radius: 50%; position: absolute; top: 30px; display: flex; justify-content: center; align-items: center; }
        .pou-eye.left { left: 30px; } .pou-eye.right { right: 30px; }
        .pou-pupil { width: 8px; height: 10px; background: #222; border-radius: 50%; }
        .pou-mouth { width: 20px; height: 8px; border-bottom: 3px solid #4a3b32; border-radius: 0 0 10px 10px; position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); }
        .exp-bar-container { width: 100%; height: 12px; background: rgba(0,0,0,0.05); border-radius: 6px; overflow: hidden; }
        .exp-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.4s ease; }
        .timer-display { font-size: 48px; font-weight: 800; text-align: center; margin: 20px 0; font-variant-numeric: tabular-nums; color: var(--text-dark); }
        .timer-controls { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .btn { padding: 12px 28px; border-radius: 16px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: var(--primary); color: white; } .btn-primary:active { transform: scale(0.95); }
        .btn-secondary { background: var(--border-color); color: var(--text-dark); }
        .todo-input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .todo-input { flex: 1; border: 2px solid var(--border-color); padding: 12px 16px; border-radius: 14px; font-size: 15px; outline: none; }
        .todo-input:focus { border-color: var(--primary); }
        .todo-list { list-style: none; }
        .todo-item { display: flex; align-items: center; padding: 12px 16px; background: var(--bg-main); border-radius: 14px; margin-bottom: 10px; transition: all 0.2s; }
        .todo-item.completed { opacity: 0.5; text-decoration: line-through; }
        .todo-checkbox { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--primary); margin-right: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .todo-checkbox i { color: white; font-size: 12px; display: none; }
        .todo-item.completed .todo-checkbox { background: var(--primary); }
        .todo-item.completed .todo-checkbox i { display: block; }
        .todo-text { flex: 1; font-size: 15px; font-weight: 500; }
        .nav-bar { position: absolute; bottom: 0; width: 100%; height: 65px; background: white; border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; align-items: center; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-gray); cursor: pointer; font-size: 12px; font-weight: 600; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>PLANA</h1>
            <div id="date-display" style="color: var(--text-gray); font-size: 14px; font-weight: 600;"></div>
        </div>

        <!-- TAB 1: POU & TIMER -->
        <div id="tab-timer" class="tab-content active">
            <div class="pou-card">
                <div class="pou-status">
                    <span id="pou-level-name" class="pou-stage">Baby Pou</span>
                    <span>Lv.<span id="pou-level">1</span></span>
                </div>
                <div class="pou-container">
                    <div class="pou" id="pou-character" onclick="petPou()">
                        <div class="pou-eye left"><div class="pou-pupil"></div></div>
                        <div class="pou-eye right"><div class="pou-pupil"></div></div>
                        <div class="pou-mouth"></div>
                    </div>
                </div>
                <div class="exp-bar-container">
                    <div class="exp-bar" id="exp-bar"></div>
                </div>
            </div>

            <div class="timer-display" id="timer-display">25:00</div>
            <div class="timer-controls">
                <button class="btn btn-primary" id="start-btn" onclick="toggleTimer()">시작</button>
                <button class="btn btn-secondary" onclick="resetTimer()">리셋</button>
            </div>
        </div>

        <!-- TAB 2: TODO -->
        <div id="tab-todo" class="tab-content">
            <div class="todo-input-group">
                <input type="text" id="todo-input" class="todo-input" placeholder="오늘 할 일을 입력하세요..." onkeypress="handleKeyPress(event)">
                <button class="btn btn-primary" onclick="addTodo()">추가</button>
            </div>
            <ul class="todo-list" id="todo-list"></ul>
        </div>

        <!-- NAV -->
        <div class="nav-bar">
            <div class="nav-item active" onclick="switchTab('timer', this)"><i class="fa-solid fa-stopwatch"></i>타이머</div>
            <div class="nav-item" onclick="switchTab('todo', this)"><i class="fa-solid fa-list-check"></i>할 일</div>
        </div>
    </div>

    <script>
        let timer, timeLeft = 1500, isRunning = false;
        let exp = 0, level = 1, todos = [];
        const stages = ["Baby Pou", "Kid Pou", "Teen Pou", "Master Pou"];

        document.getElementById('date-display').innerText = new Date().toLocaleDateString('ko-KR', { month: 'short', day: 'numeric', weekday: 'short' });

        function switchTab(tab, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            el.classList.add('active');
        }

        function toggleTimer() {
            const btn = document.getElementById('start-btn');
            if (isRunning) {
                clearInterval(timer); isRunning = false; btn.innerText = '시작';
            } else {
                isRunning = true; btn.innerText = '일시정지';
                timer = setInterval(() => {
                    if (timeLeft > 0) { timeLeft--; updateTimerDisplay(); }
                    else { clearInterval(timer); isRunning = false; btn.innerText = '시작'; addExp(50); alert('집중 완료! 포우가 성장했습니다!'); resetTimer(); }
                }, 1000);
            }
        }

        function resetTimer() { clearInterval(timer); isRunning = false; timeLeft = 1500; updateTimerDisplay(); document.getElementById('start-btn').innerText = '시작'; }
        function updateTimerDisplay() {
            let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function addExp(pts) {
            exp += pts;
            if (exp >= 100) { level++; exp -= 100; updatePouStage(); }
            document.getElementById('pou-level').innerText = level;
            document.getElementById('exp-bar').style.width = `${exp}%`;
        }

        function updatePouStage() {
            let idx = Math.min(Math.floor((level - 1) / 3), stages.length - 1);
            document.getElementById('pou-level-name').innerText = stages[idx];
            document.getElementById('pou-character').style.transform = `scale(${1 + idx * 0.15})`;
        }

        function petPou() {
            const pou = document.getElementById('pou-character');
            pou.style.transform = `${pou.style.transform || ''} translateY(-10px)`;
            setTimeout(() => updatePouStage(), 200);
        }

        function addTodo() {
            const input = document.getElementById('todo-input');
            if (!input.value.trim()) return;
            todos.push({ text: input.value, done: false });
            input.value = ''; renderTodos();
        }

        function handleKeyPress(e) { if (e.key === 'Enter') addTodo(); }
        function toggleTodo(i) {
            todos[i].done = !todos[i].done;
            if (todos[i].done) addExp(15);
            renderTodos();
        }

        function renderTodos() {
            const list = document.getElementById('todo-list');
            list.innerHTML = '';
            todos.forEach((todo, i) => {
                list.innerHTML += `<li class="todo-item ${todo.done ? 'completed' : ''}">
                    <div class="todo-checkbox" onclick="toggleTodo(${i})"><i class="fa-solid fa-check"></i></div>
                    <span class="todo-text">${todo.text}</span>
                </li>`;
            });
        }
    </script>
</body>
</html>
